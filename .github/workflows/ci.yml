name: ci

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-04-26
        with:
          toolchain: stable
          # Issue #939: clippy ゲート用。dtolnay/rust-toolchain は minimal profile なので明示する。
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        # Issue #258: lockfile を Linux 環境 (WSL Ubuntu) で fresh 再生成し、
        # 全 OS 向け optional native binding (@emnapi/runtime / rollup-linux-* /
        # esbuild/linux-* 等) を含めた状態で main にコミット済み。これにより
        # npm CLI の OS-specific transitive deps バグ (npm/cli#4828) を回避しつつ、
        # `npm ci` の strict lockfile check を再度通せるようになった。
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      # Issue #959: Rust の TeamHub event payload struct から生成した TS 型が stale でないことを保証する。
      - name: Team event generated type check
        run: npm run lint:team-event-types

      # Issue #721: ESLint flat config (eslint.config.mjs) によるベースライン lint。
      # 現状はエラー 0 で通る最小ルールセット (将来 PR で段階的に厳格化する)。
      - name: ESLint
        run: npm run lint

      # Issue #1166: CSS var(--x)をCSS/TSXの定義と照合し、未定義tokenを防ぐ。
      - name: CSS custom property lint
        run: npm run lint:css-vars

      # Issue #948: 永続化ファイルの生 serde parse 握りつぶし (`serde_json::from_*(...).ok()`)
      # を検出して fail させる。読込は safe_load 共通基盤 (#936) 経由を強制する。
      # 例外は該当行直前の `// safe-load-exempt: <理由>` で明示 opt-out。
      - name: Safe-load lint (persistence parse guard)
        run: npm run lint:safe-load

      # Issue #939: ファイルサイズ ratchet。god-file 分割後の再肥大化 (recruit.rs 等) を止める。
      # 新規ファイルは 500 行以下、既存の超過ファイルは build/file-size-baseline.json の
      # 行数を上限として固定し、悪化のみ fail させる。縮小時は baseline 引き下げを促す。
      - name: File-size ratchet
        run: npm run lint:file-size

      # Issue #1161: release workflow の署名 job が依存する品質契約を静的に固定する。
      - name: Release workflow contract
        run: npm run lint:release-workflow

      # Issue #931: #[tauri::command] の戻り値を CommandResult<T> ({ code, message } の
      # 構造化エラー) に強制する。旧 3 流派 (Option<T> / ok+error 埋め込み) は baseline
      # 免除で固定し、新規 command が旧流派をコピーしたら fail させる。
      # 例外は直前行の `// command-result-exempt: <理由>` で明示 opt-out。
      - name: CommandResult lint (IPC error contract)
        run: npm run lint:command-result

      # Issue #959: renderer 向け Tauri event payload を named struct 経由に固定する。
      # `app.emit("event", json!({ ... }))` を許すと Rust emit 箇所ごとに shape が分岐し、
      # shared.ts 側 interface との二重手書きずれを CI で検出できないため fail させる。
      - name: Team event payload lint
        run: npm run lint:team-events

      # Issue #721: renderer の単体テスト (vitest) を CI で実行する。
      # 従来は package.json に test スクリプトと vitest.config.ts があるのに
      # CI で一度も走らず、renderer のリグレッションがフリーパスだった。
      - name: Vitest
        run: npm test

      - name: Build renderer
        run: npm run build:vite

      - name: Cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

      # Issue #939: clippy を品質ゲートに追加。warning を deny して新規の clippy lint 違反で
      # CI を fail させる (`grep -c clippy ci.yml = 0` だった監査指摘の解消)。現時点の警告 0 件を
      # baseline とし、許容できない lint は at-site `#[allow(...)]` + 理由コメントで明示 opt-out する。
      - name: Cargo clippy (-D warnings)
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      # Issue #97: 依存関係の脆弱性を CI で検知する。
      #   - npm audit: production deps の moderate 以上で fail。dev-only の脆弱性 (vite/esbuild の
      #     dev server 系 advisory 等) は --omit=dev で除外する。direct dependency に当たるものは
      #     overrides で fix 版に固定済み。
      #   - cargo audit: src-tauri/.cargo/audit.toml で既知の unmaintained advisory を
      #     明示 ignore しつつ、新規 advisory / vulnerability は fail させる。
      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=moderate

      # Issue #220: advisory DB ベースの npm audit だけでは、typosquat / 署名不整合 /
      # unsigned publish を検知できない。registry の署名検証も CI で必須化する。
      - name: npm audit signatures
        run: npm audit signatures

      # cargo-audit を毎回 source ビルドすると 1-2 分かかり、Swatinem/rust-cache は
      # ~/.cargo/bin を共有しないため再利用も効きにくい。pre-built バイナリを取得する。
      - name: Install cargo-audit
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-audit

      - name: Cargo audit
        working-directory: src-tauri
        run: cargo audit

  # Issue #721: verify job は ubuntu のみで動くため、`cfg(windows)` の windows-sys /
  # ConPTY 経路や `cfg(target_os = "macos")` のコードが CI で一度もコンパイルされず、
  # OS 固有のビルド破壊が main 入後に初めて発覚していた。Windows / macOS でも
  # `cargo check` を走らせ、cfg-gated コードのコンパイルを保証する。
  # apt 依存は Linux 専用なので、ここでは不要 (cargo check は webkit 等を要求しない)。
  cargo-cfg:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-04-26
        with:
          toolchain: stable
          # Issue #939: cfg-gated コード (win_job_object 等の #[cfg(windows)]) も clippy 検査する。
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: ./src-tauri -> target

      - name: Cargo check (cfg-gated build)
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

      # Issue #939: Linux verify job の clippy は cfg(windows)/cfg(macos) コードを検査しないため、
      # 各 OS でも clippy を走らせて cfg-gated コードの lint 違反を捕捉する。
      - name: Cargo clippy (cfg-gated, -D warnings)
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # Issue #1158: cfg(windows)配下のConPTY / Job Object unit testはLinuxでは列挙も実行も
      # されないため、Windows runnerでlib testを実行する。#[ignore]付き実機E2Eは対象外。
      - name: Cargo test (Windows cfg-gated unit tests)
        if: runner.os == 'Windows'
        run: "cargo test --locked --manifest-path src-tauri/Cargo.toml --lib pty::"

  # Issue #745: 既存の `npm audit` / `cargo audit` は advisory DB ベースの依存脆弱性検査で、
  # 「うっかり API key / token / 暗号鍵をコミットした」を検知できない。
  # trufflehog を CI に乗せて entropy + verified 検証ベースの secrets scan を行い、
  # PR push 時は差分 (base..head)、main / tag push 時は full repo を対象にする。
  # `--only-verified` で credential が実在エンドポイントで通用するもののみ報告 (false positive 抑制)。
  secrets-scan:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # full history が無いと PR の base..head 差分 scan / push の before..after 差分 scan が
          # commit を取得できず "fatal: bad revision" になる。trufflehog の git driver 要件。
          fetch-depth: 0

      - name: Secrets scan (trufflehog, verified-only)
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          extra_args: --only-verified
