# Release build — Linux / macOS / Windows
#
# トリガー: `v*` タグの push のみ (例: v1.1.6)。通常の main push では走らない。
# 手動実行したい時は GitHub Actions タブから v* tag を ref に選んで "Run workflow"
# もしくは `gh workflow run release.yml --ref <v* tag>` で起動可能 (workflow_dispatch)。
#
# 成果物: tauri-apps/tauri-action が GitHub Release を draft で作成し、
#   - Windows: .exe (NSIS インストーラ)
#   - macOS:   .dmg (universal2 — Apple Silicon + Intel)
#   - Linux:   .AppImage / .deb / .rpm
# を upload する。全 OS の build / SBOM / provenance が成功した場合だけ release を
# 公開し、その後で固定 updater channel を更新する。
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release-ref:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require v* tag on main history
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Release ref must be a v* tag: ${GITHUB_REF}" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release commit ${GITHUB_SHA} is not in origin/main history" >&2
            exit 1
          fi

  quality-gate:
    needs: validate-release-ref
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  build:
    needs:
      - validate-release-ref
      - quality-gate
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS は universal2 dmg (Apple Silicon + Intel) を 1 本ビルドする。
          # これにより Intel Mac ユーザーへの updater 配信を復活させる (#722)。
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            bundle_dir: 'src-tauri/target/universal-apple-darwin/release/bundle'
            attest_subjects: 'src-tauri/target/universal-apple-darwin/release/bundle/dmg/**/*.dmg'
            sbom_file: 'sbom-macos-universal.cdx.json'
          - platform: ubuntu-22.04
            args: ''
            bundle_dir: 'src-tauri/target/release/bundle'
            attest_subjects: 'src-tauri/target/release/bundle/appimage/**/*.AppImage, src-tauri/target/release/bundle/deb/**/*.deb, src-tauri/target/release/bundle/rpm/**/*.rpm'
            sbom_file: 'sbom-linux.cdx.json'
          - platform: windows-latest
            args: ''
            bundle_dir: 'src-tauri/target/release/bundle'
            attest_subjects: 'src-tauri/target/release/bundle/nsis/**/*.exe'
            sbom_file: 'sbom-windows.cdx.json'

    runs-on: ${{ matrix.platform }}
    steps:
      # Issue #188 (Security): mutable tag (@v4 / @stable / @v0.5.22) のみだと、上流が
      # force-update or 乗っ取られた場合に同 job 内の TAURI_SIGNING_PRIVATE_KEY /
      # PASSWORD / GITHUB_TOKEN を吸い出され署名済み悪意 updater を Releases に push
      # 可能 (#142 と合流すると全ユーザに自動配信)。各 action を SHA pin する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master @ 2026-04-26
        with:
          # macOS は universal2 (aarch64 + x86_64) ビルドのため両アーキの std を入れる
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri 自動アップデート用の署名鍵 (GitHub Secrets から)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tag 名そのものを Release タグに使う
          tagName: ${{ github.ref_name }}
          releaseName: 'vibe-editor 2 ${{ github.ref_name }}'
          releaseBody: |
            自動ビルド成果物。

            - Windows: `.exe` (NSIS インストーラ)
            - macOS:   `.dmg` (universal2 — Apple Silicon + Intel)
            - Linux:   `.AppImage` / `.deb` / `.rpm`

            全 OS の build・SBOM・provenance 成功後に自動公開されます。
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Generate bundle SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ matrix.bundle_dir }}
          format: cyclonedx-json
          artifact-name: ${{ matrix.sbom_file }}
          output-file: ${{ matrix.sbom_file }}
          upload-release-assets: true

      - name: Attest bundle provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ matrix.attest_subjects }}

      - name: Attest bundle SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ matrix.attest_subjects }}
          sbom-path: ${{ github.workspace }}/${{ matrix.sbom_file }}

  publish-release-and-update-channel:
    needs:
      - validate-release-ref
      - quality-gate
      - build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download signed update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "${RUNNER_TEMP}/update-channel"
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern latest.json \
            --dir "${RUNNER_TEMP}/update-channel"

      - name: Validate update manifest
        env:
          MANIFEST_PATH: ${{ runner.temp }}/update-channel/latest.json
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, 'utf8'));
          const expectedVersion = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const platforms = Object.values(manifest.platforms ?? {});
          if (manifest.version !== expectedVersion) {
            throw new Error(`manifest version ${manifest.version} != tag ${expectedVersion}`);
          }
          if (platforms.length === 0 || platforms.some(({ url, signature }) => !url || !signature)) {
            throw new Error('manifest must contain signed updater assets');
          }
          NODE

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            | jq --raw-output --arg tag "${GITHUB_REF_NAME}" \
              '.[] | select(.tag_name == $tag and .draft) | .id')"
          if [[ -z "${release_id}" || "${release_id}" == *$'\n'* ]]; then
            echo "Expected exactly one draft release for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          prerelease=false
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease=true
          fi
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -F prerelease="${prerelease}" \
            --silent

      - name: Publish fixed updater channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_PATH: ${{ runner.temp }}/update-channel/latest.json
        run: |
          content="$(base64 -w0 "${MANIFEST_PATH}")"
          if ! gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/update-channel" \
            --silent 2>/dev/null; then
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref=refs/heads/update-channel \
              -f sha="${GITHUB_SHA}" \
              --silent
          fi
          current_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/contents/latest.json?ref=update-channel" \
            --jq .sha 2>/dev/null || true)"
          request=(
            -f message="chore(release): publish ${GITHUB_REF_NAME} updater channel"
            -f content="${content}"
            -f branch=update-channel
          )
          if [[ -n "${current_sha}" ]]; then
            request+=(-f sha="${current_sha}")
          fi
          gh api --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/latest.json" \
            "${request[@]}" \
            --silent

      - name: Verify public updater channel
        run: |
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/update-channel/latest.json?release=${GITHUB_REF_NAME}" \
            --output "${RUNNER_TEMP}/public-latest.json"
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}" \
            MANIFEST_PATH="${RUNNER_TEMP}/public-latest.json" \
            node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, 'utf8'));
          if (manifest.version !== process.env.EXPECTED_VERSION) {
            throw new Error(`public channel version ${manifest.version} != ${process.env.EXPECTED_VERSION}`);
          }
          NODE
