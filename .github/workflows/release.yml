# Release build — Linux / macOS / Windows
#
# トリガー: `v*` タグの push のみ (例: v1.1.6)。通常の main push では走らない。
# 手動実行したい時は GitHub Actions タブから v* tag を ref に選んで "Run workflow"
# もしくは `gh workflow run release.yml --ref <v* tag>` で起動可能 (workflow_dispatch)。
#
# 成果物: tauri-apps/tauri-action が GitHub Release を draft で作成し、
#   - Windows: .exe (NSIS インストーラ)
#   - macOS:   .dmg (universal2 — Apple Silicon + Intel)
#   - Linux:   .AppImage / .deb / .rpm
# を upload する。確認後、Releases ページで手動 publish する。
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release-ref:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require v* tag on main history
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Release ref must be a v* tag: ${GITHUB_REF}" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release commit ${GITHUB_SHA} is not in origin/main history" >&2
            exit 1
          fi

  quality-gate:
    needs: validate-release-ref
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  build:
    needs:
      - validate-release-ref
      - quality-gate
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS は universal2 dmg (Apple Silicon + Intel) を 1 本ビルドする。
          # これにより Intel Mac ユーザーへの updater 配信を復活させる (#722)。
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            bundle_dir: 'src-tauri/target/universal-apple-darwin/release/bundle'
            attest_subjects: 'src-tauri/target/universal-apple-darwin/release/bundle/dmg/**/*.dmg'
            sbom_file: 'sbom-macos-universal.cdx.json'
          - platform: ubuntu-22.04
            args: ''
            bundle_dir: 'src-tauri/target/release/bundle'
            attest_subjects: 'src-tauri/target/release/bundle/appimage/**/*.AppImage, src-tauri/target/release/bundle/deb/**/*.deb, src-tauri/target/release/bundle/rpm/**/*.rpm'
            sbom_file: 'sbom-linux.cdx.json'
          - platform: windows-latest
            args: ''
            bundle_dir: 'src-tauri/target/release/bundle'
            attest_subjects: 'src-tauri/target/release/bundle/nsis/**/*.exe'
            sbom_file: 'sbom-windows.cdx.json'

    runs-on: ${{ matrix.platform }}
    steps:
      # Issue #188 (Security): mutable tag (@v4 / @stable / @v0.5.22) のみだと、上流が
      # force-update or 乗っ取られた場合に同 job 内の TAURI_SIGNING_PRIVATE_KEY /
      # PASSWORD / GITHUB_TOKEN を吸い出され署名済み悪意 updater を Releases に push
      # 可能 (#142 と合流すると全ユーザに自動配信)。各 action を SHA pin する。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-04-26
        with:
          # macOS は universal2 (aarch64 + x86_64) ビルドのため両アーキの std を入れる
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri 自動アップデート用の署名鍵 (GitHub Secrets から)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tag 名そのものを Release タグに使う
          tagName: ${{ github.ref_name }}
          releaseName: 'vibe-editor ${{ github.ref_name }}'
          releaseBody: |
            自動ビルド成果物。

            - Windows: `.exe` (NSIS インストーラ)
            - macOS:   `.dmg` (universal2 — Apple Silicon + Intel)
            - Linux:   `.AppImage` / `.deb` / `.rpm`

            動作確認後にこの draft を publish してください。
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Generate bundle SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ matrix.bundle_dir }}
          format: cyclonedx-json
          artifact-name: ${{ matrix.sbom_file }}
          output-file: ${{ matrix.sbom_file }}
          upload-release-assets: true

      - name: Attest bundle provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ matrix.attest_subjects }}

      - name: Attest bundle SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ matrix.attest_subjects }}
          sbom-path: ${{ github.workspace }}/${{ matrix.sbom_file }}
